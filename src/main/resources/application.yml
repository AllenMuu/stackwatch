spring:
  application:
    name: stackwatch

  autoconfigure:
    # L2 关闭时排除 DB 自动装配，确保无 PostgreSQL 也能零基础设施启动
    # L2 启用时：删除以下两项 + 配置 datasource + 取消 spring.ai.openai.embedding 注释
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

  ai:
    openai:
      # DashScope 兼容 OpenAI 协议；切换其他厂商只需改 base-url + model
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      chat:
        options:
          model: ${LLM_CHAT_MODEL:qwen-plus}
          temperature: 0.2
      # embedding 暂不启用（L2 向量归并解锁后再配）
      # embedding:
      #   options:
      #     model: text-embedding-v3

stackwatch:
  analysis:
    # L2 向量归并相似度阈值
    similarity-threshold: 0.92
    # L3 LLM 根因置信度兜底阈值（低于此值转人工）
    confidence-threshold: 0.6
    # 指纹参与 hash 的栈顶业务帧数
    fingerprint-top-n: 5
  cache:
    # L1 指纹缓存 TTL（秒），默认 24 小时
    fingerprint-ttl-seconds: 86400
    # L1 缓存最大条目
    fingerprint-max-size: 100000
  l2:
    # L2 默认关闭：false 时走 InMemoryClusterRepository（findSimilar 返回 empty 强制 L3）
    # 启用需：true + 删除上方 autoconfigure.exclude 两项 + 配 datasource + 取消 embedding 注释
    enabled: false
  feishu:
    # 实时告警/周报推送用自定义机器人 webhook（留空则跳过推送，仅 warn）
    webhook-url: ${FEISHU_WEBHOOK_URL:}
    # 飞书 OpenAPI 基址（富文本卡片解锁后使用）
    api-url: ${FEISHU_API_URL:https://open.feishu.cn/open-apis}

logging:
  level:
    com.stackwatch: INFO
